<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 15px;
}

.header img {
    width: 100px;
    border-radius: 50%;
    border: 3px solid #00ff88;
    box-shadow: 0 0 20px #00ff88;
}

.header h1 {
    color: #00ff88;
}

/* SUBSCRIBE BUTTON */
.subscribe {

    color: black;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 0 20px #00ff88;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 10px #00ff88; }
    to { box-shadow: 0 0 25px #00ff88; }
}

/* VIDEO CARDS */
.container {
    padding: 10px;
}

.card {
    background: #111;
    margin: 12px;
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
    color: white;
    display: block;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
}

.card p {
    padding: 10px;
}

/* SOCIAL */
.social {
    text-align: center;
    margin: 20px;
}

.social i {
    font-size: 28px;
    margin: 10px;

.fa-youtube { color: red; }
