<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR TOM EDITZ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: white;
}

/* NAV */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.nav i { color: #00ff88; font-size: 20px; }

/* SECTION */
.section {
    padding: 20px;
    display: none;
}

.active { display: block; }

/* HERO */
.hero {
    text-align: center;
}

.hero img {
    width: 90px;
    border-radius: 50%;
    border: 2px solid #00ff88;
}

.hero h1 { color: #00ff88; }

.btn {
    display: inline-block;
    margin: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    background: #00ff88;
    color: black;
    text-decoration: none;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
}

.card {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
}

/* ABOUT */
.about {
    text-align: center;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="section active">
    <div class="hero">
        <img src="https://i.ibb.co/2kR5zqP/profile.png">
        <h1>MR TOM EDITZ</h1>
        <p>Love | Lofi | 4K Status</p>

        <a class="btn" href="https://youtube.com/@mrtomeditz">Subscribe</a>
        <a class="btn" href="https://wa.me/917992751245">WhatsApp</a>
    </div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
    <h2>Latest Videos</h2>
    <div class="grid" id="videoContainer"></div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
    <div class="about">
        <h2>About Me</h2>
        <p>I create romantic, lofi & emotional status videos ❤️</p>
        <p>Follow me for daily uploads 🔥</p>
    </div>
</div>

<!-- NAVIGATION -->
<div class="nav">
    <i onclick="show('home')" class="fas fa-home"></i>
    <i onclick="show('videos')" class="fas fa-play"></i>
    <i onclick="show('about')" class="fas fa-user"></i>
</div>

<script>

// NAV SWITCH
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ✅ API KEY + CHANNEL ID ADDED
const API_KEY = "AIzaSyAaQnl5K1X_eugXH-BoBP1NizDaT5VDmLE";
const CHANNEL_ID = "UCJy9dQ9rIkaJXyKAMc7HfJQ";

async function loadVideos(){
    let url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=20`;

    let res = await fetch(url);
    let data = await res.json();

    let container = document.getElementById("videoContainer");

    data.items.forEach(item=>{
        if(item.id.videoId){
            container.innerHTML += `
            <a class="card" href="https://youtube.com/watch?v=${item.id.videoId}" target="_blank">
                <img src="${item.snippet.thumbnails.medium.url}">
                <div class="play">▶</div>
            </a>
            `;
        }
    });
}

loadVideos();

</script>

</body>
</html>
