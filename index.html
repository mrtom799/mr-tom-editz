<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR TOM EDITZ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #001a0d, #000);
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
}

.header img {
    width: 80px;
    border-radius: 50%;
    border: 2px solid #00ff88;
    box-shadow: 0 0 15px #00ff88;
}

.header h1 { color: #00ff88; margin: 5px; }

.subscribe {
    display: inline-block;
    padding: 8px 18px;
    border-radius: 20px;
    background: #00ff88;
    color: black;
    text-decoration: none;
    box-shadow: 0 0 20px #00ff88;
}

/* FEATURED */
.featured {
    margin: 15px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
}

.featured img { width: 100%; }

.play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: white;
}

/* SECTION TITLE */
.title {
    padding: 10px;
    font-size: 16px;
    color: #00ff88;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
    padding: 10px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: white;
    position: relative;
    transform: perspective(500px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05) rotateX(5deg);
}

.card img {
    width: 100%;
    height: 110px;
    object-fit: cover;
}

.card .play {
    font-size: 25px;
}

/* SOCIAL FLOAT */
.social {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border: 1px solid #00ff88;
    border-radius: 30px;
    padding: 8px 15px;
}

.social i {
    margin: 0 10px;
    font-size: 20px;
}

.fa-youtube { color: red; }
.fa-instagram { color: #ff2f92; }
.fa-whatsapp { color: #25D366; }

</style>
</head>

</html>
